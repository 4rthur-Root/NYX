# Mapping nom de fichier source → type de parser
sources:
  "debian.log":              "syslog"
  "OPNsense.internal.log":   "filterlog"
  "DESKTOP-PME.log":         "windows"

# Rétention des données SQLite
retention:
  events_hours: 24
  context_cleanup_interval_seconds: 3600

# Queue en mémoire reader → dispatcher
queue:
  maxsize: 10000

# Chemins filesystem
log_dir:    "/var/log/remote"
db_path:    "engine/engine.db"
alerts_dir: "/var/log/nyxsoc/alerts"
alerts_log: "/var/log/nyxsoc/engine.log"

samba_mounts:
  commun:        "/mnt/samba/commun"
  direction:     "/mnt/samba/direction"
  comptabilite:  "/mnt/samba/comptabilite"
  technique:     "/mnt/samba/technique"

# Canal de communication vers le module SOAR
soar:
  channel: "file"
  alerts_dir: "/var/log/nyxsoc/alerts"

# Chemins vers les règles de détection
rules:
  attack: "engine/rules/attack"

# Types d'événements retenus pour les règles 
event_types: [
        "ssh_failure", "logon_success", "logon_failure",
        "samba_read", "samba_write", "smb_failure",
        "http_request", "net_scan", "firewall_block",
        "file_create", "process_exec", "net_connect",
        "tgt_request", "tgs_request"
      ]