rule_id: SMB_EXFIL_001
type: 3
description: >
  Exfiltration SMB — cooccurrence d'un scan réseau et d'un accès Samba
  depuis la même IP .
severity: CRITICAL
mitre_tactic: "TA0010"
mitre_technique: "T1021.002"
source_host_pattern: "*"

condition:
  event_types:
    - net_scan
    - samba_read
  window_seconds: 300
  group_by: actor_ip
  min_count_per_type: 1

response:
  alert: true