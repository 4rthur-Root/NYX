## ============================================================
## nxlog.conf - NyxSOC Windows 10 (NYX-PME)
## Forward des logs Sysmon + Security vers le SOC (10.0.1.10:514)
## Format : Syslog RFC 5424
## ============================================================

define ROOT C:\Program Files\nxlog
define HOSTNAME NYX-PME

Moduledir %ROOT%\modules
CacheDir  %ROOT%\data
Pidfile   %ROOT%\data\nxlog.pid
SpoolDir  %ROOT%\data
LogFile   %ROOT%\data\nxlog.log

# ------------------------------------------------------------
# INPUT : journal Sysmon (Event IDs 1, 2, 3, 11 uniquement,
# déjà filtrés en amont par sysmonconfig-nyxsoc.xml)
# ------------------------------------------------------------
<Input in_sysmon>
    Module      im_msvistalog
    <QueryXML>
        <QueryList>
            <Query Id="0">
                <Select Path="Microsoft-Windows-Sysmon/Operational">*</Select>
            </Query>
        </QueryList>
    </QueryXML>
</Input>

# ------------------------------------------------------------
# INPUT : journal Security (authentification Kerberos/NTLM,
# nécessaire pour les Event IDs 4624, 4625, 4768, 4769)
# ------------------------------------------------------------
<Input in_security>
    Module      im_msvistalog
    <QueryXML>
        <QueryList>
            <Query Id="0">
                <Select Path="Security">
                    Event[System[(EventID=4624 or EventID=4625 or EventID=4768 or EventID=4769)]]
                </Select>
            </Query>
        </QueryList>
    </QueryXML>
</Input>

# ------------------------------------------------------------
# OUTPUT : forward UDP vers le SOC, format Syslog RFC 5424
# ------------------------------------------------------------
<Output out_soc>
    Module      om_udp
    Host        10.0.1.10
    Port        514
    Exec        to_syslog_ietf();
</Output>

# ------------------------------------------------------------
# ROUTES
# ------------------------------------------------------------
<Route sysmon_to_soc>
    Path        in_sysmon => out_soc
</Route>

<Route security_to_soc>
    Path        in_security => out_soc
</Route>
