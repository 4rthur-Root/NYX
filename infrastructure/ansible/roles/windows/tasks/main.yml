---
- name: Installer Sysmon via Chocolatey
  win_chocolatey:
    name: sysmon
    state: present

- name: Installer NXLog via Chocolatey
  win_chocolatey:
    name: nxlog
    state: present

- name: Création du répertoire pour la configuration Sysmon
  win_file:
    path: C:\ProgramData\Sysmon
    state: directory

- name: Déploiement de la configuration Sysmon
  win_template:
    src: sysmon-config.xml.j2
    dest: C:\ProgramData\Sysmon\sysmon-config.xml
  register: sysmon_config

- name: Appliquer la configuration Sysmon
  win_shell: |
    if (Test-Path "C:\Windows\Sysmon64.exe") {
        & "C:\Windows\Sysmon64.exe" -c C:\ProgramData\Sysmon\sysmon-config.xml
    } elseif (Test-Path "C:\Windows\sysmon.exe") {
        & "C:\Windows\sysmon.exe" -c C:\ProgramData\Sysmon\sysmon-config.xml
    } else {
        sysmon -c C:\ProgramData\Sysmon\sysmon-config.xml
    }
  when: sysmon_config.changed

- name: Création du répertoire de configuration NXLog
  win_file:
    path: C:\ProgramData\NXLog
    state: directory

- name: Déploiement de la configuration NXLog
  win_template:
    src: nxlog.conf.j2
    dest: C:\ProgramData\NXLog\nxlog.conf
  notify: restart nxlog

- name: Démarrage du service NXLog
  win_service:
    name: NXLog
    state: started
    start_mode: auto

- name: Configurer les routes et métriques réseau pour Windows 10
  win_shell: |
    # 1. Configuration de la passerelle LAN (10.0.1.1)
    $lanInterface = Get-NetIPAddress -IPAddress "10.0.1.30" -ErrorAction SilentlyContinue | Get-NetIPInterface -ErrorAction SilentlyContinue
    if ($lanInterface) {
        $route = Get-NetRoute -DestinationPrefix "0.0.0.0/0" -InterfaceIndex $lanInterface.InterfaceIndex -ErrorAction SilentlyContinue
        if (-not $route) {
            New-NetRoute -DestinationPrefix "0.0.0.0/0" -InterfaceIndex $lanInterface.InterfaceIndex -NextHop "10.0.1.1" -RouteMetric 10 -Confirm:$false
        } else {
            Set-NetRoute -DestinationPrefix "0.0.0.0/0" -InterfaceIndex $lanInterface.InterfaceIndex -NextHop "10.0.1.1" -RouteMetric 10 -Confirm:$false
        }
    }

    # 2. Augmenter la métrique de l'interface de Management (Vagrant)
    $mgmtInterface = Get-NetIPAddress -IPAddress "192.168.121.*" -ErrorAction SilentlyContinue | Get-NetIPInterface -ErrorAction SilentlyContinue
    if ($mgmtInterface) {
        Set-NetIPInterface -InterfaceIndex $mgmtInterface.InterfaceIndex -InterfaceMetric 500
    }
  register: win_network_routing
  changed_when: false
