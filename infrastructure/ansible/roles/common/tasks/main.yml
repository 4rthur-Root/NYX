---
- name: Mise à jour du cache apt
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Installation des paquets de base
  apt:
    name:
      - chrony
      - curl
      - wget
      - vim
      - htop
      - net-tools
      - rsyslog
      - python3
      - python3-pip
    state: present

- name: Déploiement du template chrony.conf
  template:
    src: chrony.conf.j2
    dest: /etc/chrony/chrony.conf
    owner: root
    group: root
    mode: 0644
  notify: restart chrony

- name: Déploiement du template interfaces
  template:
    src: interfaces.j2
    dest: /etc/network/interfaces
    owner: root
    group: root
    mode: 0644
  notify: restart networking

- name: Démarrage et activation de chrony
  systemd:
    name: chrony
    state: started
    enabled: true
