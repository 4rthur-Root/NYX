---
- name: Installation des paquets SOC
  apt:
    name:
      - rsyslog
      - python3
      - python3-pip
      - python3-venv
      - auditd
      - aide
    state: present

- name: Création du répertoire pour les logs centralisés
  file:
    path: /var/log/remote
    state: directory
    owner: syslog
    group: adm
    mode: 0755

- name: Création du répertoire pour le moteur Python
  file:
    path: /opt/soc-engine
    state: directory
    owner: root
    group: root
    mode: 0755

- name: Activation de rsyslog UDP/TCP 514
  lineinfile:
    path: /etc/rsyslog.conf
    regexp: "^#{{ item }}"
    line: "{{ item }}"
  loop:
    - module(load="imudp")
    - input(type="imudp" port="514")
    - module(load="imtcp")
    - input(type="imtcp" port="514")
  notify: restart rsyslog

- name: Déploiement de la règle de routage des logs distants
  template:
    src: 10-remote.conf.j2
    dest: /etc/rsyslog.d/10-remote.conf
    owner: root
    group: root
    mode: 0644
  notify: restart rsyslog
